<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>SOS - Super Admin Authority Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rajdhani', sans-serif; background-color: #f8fafc; }
        .clock-box { background: #0f172a; border: 1px solid rgba(99, 102, 241, 0.4); padding: 5px 15px; border-radius: 10px; color: #818cf8; font-family: 'Orbitron', sans-serif; box-shadow: 0 0 10px rgba(99, 102, 241, 0.2); }
        .stat-card { background: white; padding: 20px; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .sheet-table th { background: #f1f5f9; border: 1px solid #e2e8f0; font-size: 11px; padding: 12px; color: #475569; text-transform: uppercase; position: sticky; top: 0; z-index: 10; }
        .sheet-table td { border: 1px solid #e2e8f0; padding: 10px; font-size: 14px; text-align: center; font-weight: 500; }
        .receipt-box { width: 100%; background: #fff; padding: 20px; border: 2.5px solid #000; position: relative; overflow: hidden; height: 430px; }
        .cut-line { border-top: 2px dashed #000; margin: 25px 0; position: relative; width: 100%; }
        .cut-line::after { content: '✂ CUT HERE'; position: absolute; top: -11px; left: 45%; background: #fff; padding: 0 10px; font-size: 12px; font-weight: bold; }
        #settingsPanel { transition: all 0.5s cubic-bezier(0.85, 0, 0.15, 1); transform: translateX(100%); z-index: 100; }
        #settingsPanel.open { transform: translateX(0); }
        .admin-view { display: none !important; }
        @media print { 
            @page { margin: 5mm; size: auto; }
            .no-print { display: none !important; } 
            #dashboard, #settingsPanel { display: none !important; } 
            #receiptSection { display: block !important; width: 100% !important; margin: 0 !important; padding: 0 !important; } 
            .receipt-box { border: 2.5px solid #000 !important; page-break-inside: avoid; } 
            .cut-line { display: block !important; border-top: 2px dashed #000 !important; }
        }
    </style>
</head>
<body class="overflow-x-hidden" onload="initDashboard()">

    <div id="dashboard" class="min-h-screen flex flex-col">
        <nav class="bg-white border-b-2 border-slate-100 px-8 py-3 flex justify-between items-center no-print sticky top-0 z-50">
            <div class="flex items-center gap-6">
                <h2 class="text-2xl font-black text-slate-800 italic uppercase">SOS<span class="text-indigo-600">.</span></h2>
                <div class="clock-box"><div id="liveClock" class="text-sm font-bold tracking-widest">00:00:00 AM</div></div>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right leading-none border-r pr-6">
                    <p id="displayUser" class="font-bold text-slate-800 text-lg uppercase">SHIVAM (SUPER ADMIN)</p>
                    <button onclick="toggleSettings()" class="text-[10px] text-indigo-500 font-black uppercase mt-1 hover:underline">Settings ⚙️</button>
                </div>
                <button onclick="location.reload()" class="bg-red-50 text-red-600 px-6 py-2 rounded-xl text-xs font-black border border-red-100 uppercase hover:bg-red-600 transition">Reset Portal</button>
            </div>
        </nav>

        <div class="p-8 pb-0 grid grid-cols-1 md:grid-cols-3 gap-6" id="adminStats">
            <div class="stat-card border-l-8 border-indigo-600">
                <p class="text-xs uppercase font-bold text-slate-400">Total Revenue</p>
                <h2 class="text-3xl font-black text-slate-800" id="totalSale">₹ 0.00</h2>
            </div>
            <div class="stat-card border-l-8 border-emerald-500">
                <p class="text-xs uppercase font-bold text-slate-400">Cash Flow</p>
                <h2 class="text-3xl font-black text-emerald-600" id="totalCash">₹ 0.00</h2>
            </div>
            <div class="stat-card border-l-8 border-blue-500">
                <p class="text-xs uppercase font-bold text-slate-400">Online / UPI</p>
                <h2 class="text-3xl font-black text-blue-600" id="totalOnline">₹ 0.00</h2>
            </div>
        </div>

        <div class="p-8 grid lg:grid-cols-4 gap-8 no-print">
            <div class="lg:col-span-1 bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100">
                <div class="space-y-4">
                    <input type="text" id="custName" placeholder="CUSTOMER NAME" class="w-full p-4 border rounded-2xl bg-slate-50 uppercase font-bold outline-none">
                    <input type="tel" id="custMobile" placeholder="MOBILE" class="w-full p-4 border rounded-2xl bg-slate-50 outline-none">
                    <input type="text" id="serviceName" placeholder="SERVICE" class="w-full p-4 border rounded-2xl bg-slate-50 uppercase font-bold outline-none">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="totalAmt" oninput="calc()" placeholder="TOTAL" class="p-4 border rounded-2xl bg-blue-50 font-black text-blue-700 outline-none">
                        <input type="number" id="paidAmt" oninput="calc()" placeholder="PAID" class="p-4 border rounded-2xl bg-green-50 font-black text-green-700 outline-none">
                    </div>
                    <input type="number" id="pendingAmt" readonly class="w-full p-4 border rounded-2xl bg-red-50 text-red-600 font-black text-2xl text-center">
                    
                    <select id="payMode" onchange="toggleUtrField()" class="w-full p-4 border rounded-2xl bg-slate-100 font-bold uppercase text-sm">
                        <option value="Cash Payment">Cash Payment</option>
                        <option value="Online / UPI">Online / UPI</option>
                    </select>

                    <div id="utrContainer" class="hidden animate__animated animate__fadeIn">
                        <input type="text" id="utrNo" placeholder="UTR NO. / REF NO. *" class="w-full p-4 border-2 border-amber-500 rounded-2xl bg-amber-50 font-bold uppercase outline-none text-slate-800">
                    </div>

                    <button id="saveBtn" onclick="saveAndPreview()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold uppercase shadow-lg hover:bg-indigo-700 transition">Save & Preview</button>
                </div>
            </div>

            <div class="lg:col-span-3 bg-white p-4 rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden">
                <div class="flex justify-between items-center p-4 border-b">
                    <h3 class="font-black text-slate-800 uppercase tracking-widest italic text-sm">Database Records</h3>
                    <button onclick="fetchSheetData()" class="bg-slate-800 text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase">Refresh</button>
                </div>
                <div class="overflow-x-auto h-[550px]">
                    <table class="w-full sheet-table">
                        <thead>
                            <tr><th>TXN ID</th><th>NAME</th><th>MOBILE</th><th>SERVICE</th><th>TOTAL</th><th>PAID</th><th>PENDING</th><th>DATE</th><th>TIME</th><th>MODE</th><th>OPERATOR</th><th>ACTION</th></tr>
                        </thead>
                        <tbody id="sheetBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="settingsPanel" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl p-10 border-l-4 border-indigo-600 no-print">
            <button onclick="toggleSettings()" class="text-slate-400 font-bold hover:text-red-500 mb-10 uppercase text-xs">✕ Close Control</button>
            <h3 class="text-2xl font-black mb-8 uppercase italic underline decoration-indigo-500">Security Control</h3>
            <div class="space-y-6">
                <div id="adminUserSelector">
                    <label class="text-[10px] font-bold text-slate-400 uppercase block mb-2">Select Account</label>
                    <select id="targetUser" onchange="switchOperator(this.value)" class="w-full p-3 border rounded-xl bg-slate-50 font-bold outline-none"></select>
                </div>
                <p class="text-xs text-slate-500 italic">Portal is open. Security keys disabled.</p>
            </div>
        </div>
    </div>

    <div id="receiptSection" class="hidden max-w-2xl mx-auto my-4 space-y-2 no-print p-4">
        <div id="dualContainer" class="flex flex-col"></div>
        <div class="flex gap-4 mt-6 no-print">
            <button onclick="window.print()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-2xl uppercase tracking-widest">Execute Print</button>
            <button onclick="closeReceipt()" class="flex-1 bg-slate-200 text-slate-700 py-4 rounded-2xl font-bold uppercase">Back</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwDht3miZBNRVCCTVn0_GI5t4DS2VH_Lym3UcYHfLFjJjMI3k04kwL9nc76HhV9A8a8/exec";
        
        let users = {
            "admin": {name: "Signature/seal)", role: "admin"},
            "sos01": {name: "Staff-01", role: "staff"},
            "sos02": {name: "Staff-02", role: "staff"},
            "sos03": {name: "Staff-03", role: "staff"},
            "sos04": {name: "Staff-04", role: "staff"},
            "sos05": {name: "Staff-05", role: "staff"},
            "sos06": {name: "Staff-06", role: "staff"},
            "sos07": {name: "Staff-07", role: "staff"},
            "sos08": {name: "Staff-08", role: "staff"},
            "sos09": {name: "Staff-09", role: "staff"},
            "sos10": {name: "Staff-10", role: "staff"}
        };

        let activeUser = users["admin"]; 
        let localCloudData = [];

        setInterval(() => {
            document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        }, 1000);

        function initDashboard() {
            const sel = document.getElementById('targetUser'); 
            sel.innerHTML = "";
            Object.keys(users).forEach(id => sel.innerHTML += `<option value="${id}">${users[id].name}</option>`);
            fetchSheetData();
        }

        function switchOperator(id) {
            activeUser = users[id];
            document.getElementById('displayUser').innerText = activeUser.name;
        }

        function toggleUtrField() {
            const payMode = document.getElementById('payMode').value;
            const utrContainer = document.getElementById('utrContainer');
            if(payMode === "Online / UPI") {
                utrContainer.classList.remove('hidden');
            } else {
                utrContainer.classList.add('hidden');
                document.getElementById('utrNo').value = ""; // Clear input if switched back
            }
        }

        async function fetchSheetData() {
            const body = document.getElementById('sheetBody'); body.innerHTML = '<tr><td colspan="12">Cloud Syncing...</td></tr>';
            try {
                const response = await fetch(SCRIPT_URL); 
                localCloudData = await response.json(); 
                body.innerHTML = "";
                let s = 0, c = 0, o = 0;
                
                localCloudData.reverse().forEach((row) => {
                    const v = parseFloat(row.paid) || 0; s += v;
                    if(row.mode.includes("Cash")) c += v; else o += v;
                    
                    body.innerHTML += `<tr class="border-b transition hover:bg-indigo-50/50">
                        <td class="font-bold text-indigo-600 text-xs">${row.id}</td><td class="font-bold uppercase">${row.name}</td><td>${row.mobile}</td>
                        <td class="uppercase text-[10px] font-bold text-slate-400">${row.service}</td><td class="font-bold">₹${row.total}</td>
                        <td class="text-green-700 font-black">₹${row.paid}</td><td class="text-red-600 font-black">₹${row.pending}</td>
                        <td>${row.date}</td><td>${row.time}</td><td class="text-[10px] italic font-black">${row.mode}</td><td class="uppercase font-bold text-xs">${row.operator}</td>
                        <td><button onclick="reprintTXN('${row.id}')" class="bg-indigo-50 text-indigo-600 px-4 py-1 rounded-lg text-[9px] font-black uppercase">Reprint</button></td></tr>`;
                });
                
                document.getElementById('totalSale').innerText = '₹ ' + s.toLocaleString();
                document.getElementById('totalCash').innerText = '₹ ' + c.toLocaleString();
                document.getElementById('totalOnline').innerText = '₹ ' + o.toLocaleString();
            } catch (err) { body.innerHTML = '<tr><td colspan="12">Cloud Failure!</td></tr>'; }
        }

        function reprintTXN(txnId) {
            const item = localCloudData.find(x => x.id === txnId);
            if(item) {
                const content = getReceiptHTML(item, "Customer") + '<div class="cut-line"></div>' + getReceiptHTML(item, "Office");
                document.getElementById('dualContainer').innerHTML = content;
                document.getElementById('dashboard').classList.add('hidden'); 
                document.getElementById('receiptSection').classList.remove('hidden');
            } else {
                alert("Transaction not found in current session. Please Refresh.");
            }
        }

        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('open'); }
        function calc() { document.getElementById('pendingAmt').value = (parseFloat(document.getElementById('totalAmt').value) || 0) - (parseFloat(document.getElementById('paidAmt').value) || 0); }
        function closeReceipt() { document.getElementById('receiptSection').classList.add('hidden'); document.getElementById('dashboard').classList.remove('hidden'); }

        function getReceiptHTML(data, type) {
            return `<div class="receipt-box">
                <span style="position: absolute; top: 12px; right: 15px; font-size: 8px; font-weight: bold; border: 1.5px solid #000; padding: 2px 8px;">${type} COPY</span>
                <div class="text-center border-b-2 border-black pb-2 mb-2">
                    <h1 class="text-2xl font-black uppercase italic tracking-tighter text-slate-800 leading-none">SHIVAM ONLINE SERVICES</h1>
                    <p class="text-[9px] font-bold text-gray-400 mt-1 uppercase italic text-center">Vatika, jaipur | Mo: +91 8875761835 </p>
                </div>
                <div class="text-[14px] font-bold mb-2 border-b-2 border-slate-50 pb-1 uppercase italic">
                    <span class="text-indigo-600 pr-2">#${data.id}</span> NAME: ${data.name}
                </div>
                <div class="text-[11px] font-bold mb-2 border-b pb-1 uppercase italic">MOBILE: ${data.mobile}</div>
                <div class="text-[11px] font-bold mb-3 border-b pb-1 uppercase italic">SERVICE: <span>${data.service}</span></div>
                <div class="space-y-1 mb-3 text-[13px] font-semibold border-b pb-3">
                    <p class="flex justify-between uppercase">Gross Bill: <span>₹${data.total}</span></p>
                    <p class="flex justify-between text-green-700 font-black uppercase decoration-double">Paid Amount: <span>₹${data.paid}</span></p>
                    <p class="flex justify-between text-red-600 font-black border-t pt-2 text-[15px] uppercase">Pending Balance: <span>₹${data.pending}</span></p>
                </div>
                <div class="text-[9px] font-black uppercase italic flex justify-between tracking-tighter">
                    <span>DATE: ${data.date} | TIME: ${data.time}</span><span>PAY: ${data.mode}</span>
                </div>
                <div class="flex justify-end mt-4 italic"><div class="text-right border-t border-black pt-1 w-1/3 text-[10px] font-black uppercase tracking-tighter">${data.operator}</div></div>
            </div>`;
        }

        async function saveAndPreview() {
            const btn = document.getElementById('saveBtn');
            const mode = document.getElementById('payMode').value;
            const utrNo = document.getElementById('utrNo').value.trim();

            const data = { 
                id: "SOS-" + Math.floor(1000 + Math.random() * 9000), 
                name: document.getElementById('custName').value.toUpperCase(), 
                mobile: document.getElementById('custMobile').value, 
                service: document.getElementById('serviceName').value.toUpperCase(), 
                total: document.getElementById('totalAmt').value || 0, 
                paid: document.getElementById('paidAmt').value || 0, 
                pending: document.getElementById('pendingAmt').value || 0, 
                mode: mode, 
                operator: activeUser.name 
            };

            if(!data.name || !data.total) return alert("Pehle details bharein!");
            
            // Validation Check for Online Mode UTR
            if(mode === "Online / UPI" && !utrNo) {
                return alert("कृपया UTR नंबर या Reference नंबर दर्ज करें! इसके बिना रसीद नहीं काटी जा सकती।");
            }

            // If UTR exists, append to mode or manage as required
            if(utrNo) {
                data.mode = `${mode} (${utrNo})`;
            }

            const now = new Date(); const currD = now.toLocaleDateString('en-GB'); const currT = now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', hour12:true});
            const content = getReceiptHTML({...data, date: currD, time: currT}, "Customer") + '<div class="cut-line"></div>' + getReceiptHTML({...data, date: currD, time: currT}, "Office");
            document.getElementById('dualContainer').innerHTML = content;
            document.getElementById('dashboard').classList.add('hidden'); document.getElementById('receiptSection').classList.remove('hidden');
            btn.innerText = "SAVING..."; btn.disabled = true;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) }); 
            btn.innerText = "Save & Preview"; btn.disabled = false;
        }
    </script>
</body>
</html>
