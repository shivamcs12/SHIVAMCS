<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivam Enterprise | Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* ===== THEME ===== */
    :root {
        --primary: #0ea5e9; 
        --accent: #f97316;
        --bg: #0f172a;
        --card: #1e293b;
        --border: 1px solid rgba(255, 255, 255, 0.1);
    }

    body {
        margin: 0; font-family: 'Poppins', sans-serif;
        background-color: var(--bg); color: white;
        height: 100vh; overflow: hidden;
    }

    /* ===== LOGIN ===== */
    #login-screen {
        position: fixed; inset: 0; z-index: 9999; background: #000;
        display: flex; justify-content: center; align-items: center;
    }
    .login-card {
        width: 320px; padding: 40px; background: #1e293b;
        border-radius: 20px; text-align: center; border: 1px solid #333;
    }
    .inp { width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; border: 1px solid #333; color: white; border-radius: 8px; outline:none; }
    .btn { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
    
    /* ===== DASHBOARD ===== */
    #dashboard { display: none; height: 100vh; display: flex; }
    
    .sidebar { width: 250px; background: #111; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #333; }
    .menu-item { padding: 15px; cursor: pointer; color: #888; display: flex; gap: 10px; align-items: center; }
    .menu-item.active, .menu-item:hover { color: var(--primary); background: #1a1a1a; border-radius: 8px; }
    
    .content { flex: 1; padding: 30px; overflow-y: auto; background: #0b0f19; }
    .page { display: none; }
    .page.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    /* CARDS */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .card { background: var(--card); padding: 20px; border-radius: 12px; border: var(--border); }
    
    /* STAFF TABLE */
    .staff-card { background: #2d3748; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

    /* UTILS */
    .admin-only { display: none; } /* Hidden by default */
</style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--primary); text-transform:uppercase;">System Login</h2>
        <p style="color:#666; font-size:12px;">Shivam Online Services</p>
        <input type="text" id="uName" class="inp" placeholder="User ID">
        <input type="password" id="uPass" class="inp" placeholder="Password">
        <button class="btn" onclick="login()">LOGIN</button>
        <p id="errMsg" style="color:red; font-size:12px; display:none; margin-top:10px;">Invalid Credentials</p>
    </div>
</div>

<div id="dashboard">
    <div class="sidebar">
        <h2 style="color:white; margin-bottom:40px;">SHIVAM <span style="color:var(--primary)">.OS</span></h2>
        
        <div class="menu-item active" onclick="nav('home')"><i class="fas fa-home"></i> Dashboard</div>
        <div class="menu-item" onclick="nav('billing')"><i class="fas fa-file-invoice"></i> Billing</div>
        <div class="menu-item" onclick="nav('expense')"><i class="fas fa-wallet"></i> Expenses</div>
        <div class="menu-item admin-only" onclick="nav('staff')"><i class="fas fa-users-cog"></i> Staff Manager</div>
        <div class="menu-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
        
        <div style="margin-top:auto; font-size:12px; color:#555;">
            Logged in as: <span id="userDisplay" style="color:var(--primary)">Guest</span>
        </div>
    </div>

    <div class="content">
        <div id="p-home" class="page active">
            <h1>Overview</h1>
            <div class="grid">
                <div class="card"><h3>Total Bills</h3><h1 id="d-bills">0</h1></div>
                <div class="card admin-only"><h3>Total Revenue</h3><h1 id="d-rev">₹0</h1></div> </div>
            <h3>Recent History</h3>
            <div id="history-list" style="margin-top:10px;"></div>
        </div>

        <div id="p-billing" class="page">
            <h1>New Receipt</h1>
            <div class="card" style="max-width:600px;">
                <label>Transaction Type</label>
                <select id="txnType" class="inp" onchange="checkRefund()">
                    <option value="Bill">New Bill (रसीद)</option>
                    <option value="Refund" class="admin-only">Refund (Admin Only)</option> </select>

                <div style="display:flex; gap:10px;">
                    <input type="text" id="cName" class="inp" placeholder="Customer Name">
                    <input type="number" id="cMobile" class="inp" placeholder="Mobile">
                </div>
                <input type="text" id="cService" class="inp" placeholder="Service (e.g. Pan Card)">
                <div style="display:flex; gap:10px;">
                    <input type="number" id="cTotal" class="inp" placeholder="Total" oninput="calc()">
                    <input type="number" id="cPaid" class="inp" placeholder="Paid" oninput="calc()">
                    <input type="number" id="cPending" class="inp" placeholder="Pending" readonly style="background:#000;">
                </div>
                <button class="btn" id="btn-print" onclick="printReceipt()">PRINT RECEIPT</button>
            </div>
        </div>

        <div id="p-expense" class="page">
            <h1>Add Expense</h1>
            <div class="card" style="max-width:500px;">
                <input type="text" id="eItem" class="inp" placeholder="Item Name (e.g. Tea)">
                <input type="number" id="eCost" class="inp" placeholder="Cost">
                <button class="btn" style="background:var(--accent);" onclick="saveExpense()">SAVE EXPENSE</button>
            </div>
        </div>

        <div id="p-staff" class="page">
            <h1>Staff Management</h1>
            <div class="card" style="margin-bottom:20px;">
                <h3>Add New Employee</h3>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="newUser" class="inp" placeholder="User ID">
                    <input type="text" id="newPass" class="inp" placeholder="Password">
                    <input type="text" id="newName" class="inp" placeholder="Full Name">
                </div>
                <button class="btn" onclick="addStaff()">CREATE STAFF</button>
            </div>
            <div id="staff-list"></div>
        </div>
    </div>
</div>

<div id="print-area" style="display:none;">
    </div>

<script>
    // --- CONFIG ---
    const ADMIN_ID = "admin";
    const ADMIN_PASS = "38765700";
    let CURRENT_USER = null; // { name, role, id }
    
    // --- DATABASE (LocalStorage) ---
    // Default Staff if empty
    let dbStaff = JSON.parse(localStorage.getItem('shivam_staff_v2')) || [
        { name: "Demo Staff", user: "staff", pass: "1234", role: "Staff" }
    ];
    let dbHistory = JSON.parse(localStorage.getItem('shivam_history_v2')) || [];

    // --- LOGIN LOGIC ---
    function login() {
        let u = document.getElementById("uName").value.toLowerCase().trim();
        let p = document.getElementById("uPass").value.trim();
        
        // 1. Check Admin
        if(u === ADMIN_ID && p === ADMIN_PASS) {
            setupSession({ name: "Admin", role: "Admin", user: "admin" });
            return;
        }

        // 2. Check Staff
        let found = dbStaff.find(s => s.user === u && s.pass === p);
        if(found) {
            setupSession(found);
            return;
        }

        // 3. Fail
        document.getElementById("errMsg").style.display = "block";
    }

    function setupSession(user) {
        CURRENT_USER = user;
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("dashboard").style.display = "flex";
        document.getElementById("userDisplay").innerText = user.name + " (" + user.role + ")";
        
        // Apply Restrictions
        if(user.role === "Staff") {
            // Hide all Admin elements
            document.querySelectorAll(".admin-only").forEach(el => el.remove()); 
            // Remove Refund Option from Select
            let sel = document.getElementById("txnType");
            for (let i=0; i<sel.length; i++) {
                if (sel.options[i].value == 'Refund') sel.remove(i);
            }
        }

        loadHistory();
        if(user.role === "Admin") loadStaffList();
    }

    function logout() { location.reload(); }
    function nav(pid) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.getElementById('p-'+pid).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- BILLING ---
    function calc() {
        document.getElementById("cPending").value = (document.getElementById("cTotal").value || 0) - (document.getElementById("cPaid").value || 0);
    }

    function printReceipt() {
        // Collect Data
        let data = {
            id: Math.floor(Math.random()*10000),
            date: new Date().toLocaleDateString(),
            name: document.getElementById("cName").value,
            service: document.getElementById("cService").value,
            total: document.getElementById("cTotal").value,
            by: CURRENT_USER.name
        };

        if(!data.name) { alert("Enter Name"); return; }

        // Save History
        dbHistory.unshift(data);
        localStorage.setItem('shivam_history_v2', JSON.stringify(dbHistory));
        loadHistory();

        // Actual Print Logic (Simplified for stability)
        let win = window.open('', '', 'width=800,height=600');
        win.document.write(`
            <html><body style="font-family:sans-serif; padding:20px;">
            <center><h2>Shivam Online Services</h2><p>Vatica | 9664324706</p><hr></center>
            <p><b>Rcpt:</b> #${data.id} <span style="float:right">${data.date}</span></p>
            <p><b>Name:</b> ${data.name}</p>
            <p><b>Service:</b> ${data.service}</p>
            <h3>Total: ₹${data.total}</h3>
            <p>Served By: ${data.by}</p>
            <hr><center>Thank You</center>
            <script>window.print();window.close();<\/script>
            </body></html>
        `);
    }

    function loadHistory() {
        let list = document.getElementById("history-list");
        list.innerHTML = "";
        let count = 0;
        
        dbHistory.forEach(h => {
            // If staff, show only their entries? Or all? Let's show all for "Receipt data dekhna"
            let div = document.createElement("div");
            div.style.padding = "10px";
            div.style.borderBottom = "1px solid #333";
            div.innerHTML = `<small>${h.date}</small> <b>${h.name}</b> - ${h.service} (₹${h.total}) <span style="color:#888; float:right">${h.by}</span>`;
            list.appendChild(div);
            count++;
        });
        document.getElementById("d-bills").innerText = count;
    }

    // --- EXPENSES ---
    function saveExpense() {
        let item = document.getElementById("eItem").value;
        let cost = document.getElementById("eCost").value;
        if(item && cost) {
            alert("Expense Added: " + item);
            // In a real app, save this too.
            document.getElementById("eItem").value = "";
            document.getElementById("eCost").value = "";
        }
    }

    // --- STAFF MANAGER (ADMIN) ---
    function loadStaffList() {
        let div = document.getElementById("staff-list");
        div.innerHTML = "";
        dbStaff.forEach((s, i) => {
            div.innerHTML += `
                <div class="staff-card">
                    <div><b>${s.name}</b> <br> <small>ID: ${s.user} | Pass: ${s.pass}</small></div>
                    <button onclick="delStaff(${i})" style="background:red; border:none; color:white; padding:5px; cursor:pointer;">X</button>
                </div>
            `;
        });
    }

    function addStaff() {
        let u = document.getElementById("newUser").value;
        let p = document.getElementById("newPass").value;
        let n = document.getElementById("newName").value;
        if(u && p && n) {
            dbStaff.push({ name: n, user: u, pass: p, role: "Staff" });
            localStorage.setItem('shivam_staff_v2', JSON.stringify(dbStaff));
            loadStaffList();
            alert("Staff Created!");
        }
    }

    function delStaff(i) {
        if(confirm("Delete this staff?")) {
            dbStaff.splice(i, 1);
            localStorage.setItem('shivam_staff_v2', JSON.stringify(dbStaff));
            loadStaffList();
        }
    }
</script>

</body>
</html>
