


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tircha Flip UI Design</title>
    <style>
        /* CSS Section */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            position: relative;
            width: 800px;
            height: 500px;
            background: #0f0f0f;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
            border: 1px solid rgba(0, 242, 254, 0.3);
        }

        /* Forms Layout */
        .form-box {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            transition: 0.6s ease-in-out;
            z-index: 1;
        }

        .login-form { left: 0; }
        .register-form { right: 0; opacity: 0; pointer-events: none; }

        /* Diagonal (Tircha) Overlay */
        .overlay-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            transition: 0.6s ease-in-out;
            z-index: 2;
            /* Tircha Cut Effect */
            clip-path: polygon(25% 0%, 100% 0%, 100% 100%, 0% 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Active State (Jab Register par click ho) */
        .container.active .overlay-container {
            left: 0;
            clip-path: polygon(0 0, 75% 0, 100% 100%, 0% 100%);
        }

        .container.active .login-form {
            opacity: 0;
            pointer-events: none;
        }

        .container.active .register-form {
            opacity: 1;
            pointer-events: all;
        }

        /* Form Elements */
        h2 { font-size: 2rem; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid #444;
            color: white;
            outline: none;
        }
        input:focus { border-bottom: 1px solid #00f2fe; }

        .btn {
            margin-top: 20px;
            padding: 12px;
            background: #00f2fe;
            border: none;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover { box-shadow: 0 0 15px #00f2fe; }

        .switch-text {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #888;
        }

        .switch-text span {
            color: #00f2fe;
            cursor: pointer;
            text-decoration: underline;
        }

        .welcome-text {
            color: #000;
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="form-box login-form">
            <h2>Login</h2>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button class="btn">Login</button>
            <p class="switch-text">Don't have an account? <span onclick="toggle()">Sign Up</span></p>
        </div>

        <div class="form-box register-form">
            <h2>Register</h2>
            <input type="text" placeholder="Username">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <button class="btn">Register</button>
            <p class="switch-text">Already have an account? <span onclick="toggle()">Sign In</span></p>
        </div>

        <div class="overlay-container">
            <div class="welcome-text" id="welcome-txt">WELCOME!</div>
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        const welcomeTxt = document.getElementById('welcome-txt');

        function toggle() {
            container.classList.toggle('active');
            
            // Text change logic
            if(container.classList.contains('active')) {
                welcomeTxt.innerText = "HI THERE!";
            } else {
                welcomeTxt.innerText = "WELCOME!";
            }
        }
    </script>
</body>
</html>
