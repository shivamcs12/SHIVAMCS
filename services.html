<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiring Portal Pro | Shivam Bairwa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: radial-gradient(circle at center, #0a191d 0%, #000 100%);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; color: white; overflow: hidden;
        }

        .container {
            position: relative; width: 850px; height: 550px;
            background: rgba(10, 12, 12, 0.95); border-radius: 20px;
            overflow: hidden; box-shadow: 0 0 50px rgba(0, 242, 254, 0.2);
            border: 1px solid rgba(0, 242, 254, 0.3);
        }

        .form-box {
            position: absolute; top: 0; width: 50%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            padding: 40px; transition: 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1;
        }

        .login-form { left: 0; }
        .register-form { left: 0; opacity: 0; transform: translateX(-50px); pointer-events: none; }

        .overlay-container {
            position: absolute; top: 0; left: 50%; width: 50%; height: 100%;
            background: linear-gradient(135deg, #00f2fe 0%, #005f6b 100%);
            transition: 0.8s cubic-bezier(0.7, 0, 0.3, 1); z-index: 5;
            clip-path: polygon(20% 0%, 100% 0%, 100% 100%, 0% 100%);
            display: flex; justify-content: center; align-items: center;
        }

        .container.active .overlay-container {
            left: 0; clip-path: polygon(0 0, 80% 0, 100% 100%, 0% 100%);
        }

        .container.active .login-form { opacity: 0; transform: translateX(50px); pointer-events: none; }
        .container.active .register-form { opacity: 1; transform: translateX(100%); pointer-events: all; }

        h2 { font-size: 1.8rem; margin-bottom: 20px; color: #00f2fe; text-transform: uppercase; }
        .input-group { margin: 12px 0; width: 100%; }
        
        /* Mobile Input Fix */
        .phone-input-container {
            display: flex;
            gap: 5px;
        }

        /* Select box ko thoda chota aur professional banaya */
        .country-code {
            flex: 0 0 80px;
            border-radius: 5px 0 0 5px !important;
            padding: 12px 5px !important;
            font-size: 0.9rem;
        }

        .phone-field {
            flex: 1;
            border-radius: 0 5px 5px 0 !important;
        }

        input, select {
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.05);
            border: none; border-left: 3px solid #333; color: white;
            outline: none; transition: 0.3s;
        }

        input:focus, select:focus { border-left: 3px solid #00f2fe; background: rgba(0, 242, 254, 0.1); }

        .btn {
            width: 100%; padding: 14px; background: #00f2fe;
            border: none; color: #000; font-weight: 800;
            cursor: pointer; border-radius: 50px; margin-top: 10px; transition: 0.3s;
        }

        .btn:hover { box-shadow: 0 0 20px #00f2fe; transform: translateY(-2px); }

        #status-msg { 
            display: none; text-align: center; color: #00f2fe; 
            font-weight: bold; margin-top: 20px; font-size: 1.2rem;
        }

        .whatsapp-btn {
            position: fixed; bottom: 20px; right: 20px; background: #25d366;
            color: white; width: 60px; height: 60px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; text-decoration: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }

        .welcome-text { color: #000; font-size: 2.8rem; font-weight: 800; text-align: center; }
        .switch-p { margin-top: 15px; font-size: 0.85rem; text-align: center; color: #777; }
        .switch-p span { color: #00f2fe; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="form-box login-form">
            <h2>Admin Panel</h2>
            <div class="input-group"><input type="text" placeholder="Username"></div>
            <div class="input-group"><input type="password" placeholder="Password"></div>
            <button class="btn">Sign In</button>
            <p class="switch-p">Join Our Team? <span onclick="toggleUI()">Apply Now</span></p>
        </div>

        <div class="form-box register-form">
            <div id="form-content">
                <h2>Job Interest</h2>
                <form id="jobForm" action="https://formspree.io/f/xzdjzvzz" method="POST">
                    <div class="input-group">
                        <input type="text" name="Candidate_Name" placeholder="Full Name" required>
                    </div>
                    
                    <div class="input-group">
                        <input type="email" name="Email" placeholder="Email (name@mail.com)" 
                        pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" required>
                    </div>
                    
                    <div class="input-group phone-input-container">
                        <select name="Code" class="country-code" required>
                            <option value="+91">+91</option>
                            <option value="+1">+1</option>
                            <option value="+44">+44</option>
                        </select>
                        <input type="tel" name="WhatsApp_Number" class="phone-field" placeholder="10-Digit Mobile" 
                        pattern="[0-9]{10}" maxlength="10" required>
                    </div>
                    
                    <div class="input-group">
                        <select name="Job_Role" required>
                            <option value="" disabled selected>Select Post</option>
                            <option value="IT Manager">IT Manager</option>
                            <option value="Computer Operator">Computer Operator</option>
                            <option value="Accountant">Accountant</option>
                            <option value="Software Developer">Software Developer</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <select name="Experience" required>
                            <option value="" disabled selected>Experience</option>
                            <option value="Fresher">Fresher</option>
                            <option value="1-2 Years">1-2 Years</option>
                            <option value="3+ Years">3+ Years</option>
                        </select>
                    </div>

                    <button type="submit" id="submit-btn" class="btn">Submit Application</button>
                </form>
            </div>
            <div id="status-msg">✅ Success! Shivam will contact you.</div>
            <p class="switch-p">Staff? <span onclick="toggleUI()">Back to Login</span></p>
        </div>

        <div class="overlay-container">
            <div id="text-box" class="welcome-text">JOIN US</div>
        </div>
    </div>

    <a href="https://wa.me/918875761835" class="whatsapp-btn" target="_blank">💬</a>

    <script>
        const container = document.getElementById('container');
        const textBox = document.getElementById('text-box');
        const jobForm = document.getElementById('jobForm');
        const formContent = document.getElementById('form-content');
        const statusMsg = document.getElementById('status-msg');

        function toggleUI() {
            container.classList.toggle('active');
            textBox.style.opacity = "0";
            setTimeout(() => {
                textBox.innerText = container.classList.contains('active') ? "CAREERS" : "JOIN US";
                textBox.style.opacity = "1";
            }, 400);
        }

        jobForm.addEventListener("submit", async function(event) {
            event.preventDefault();
            const data = new FormData(event.target);
            const submitBtn = document.getElementById('submit-btn');
            
            submitBtn.innerText = "Sending...";
            submitBtn.disabled = true;

            fetch(event.target.action, {
                method: jobForm.method,
                body: data,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    formContent.style.display = "none";
                    statusMsg.style.display = "block";
                    setTimeout(() => {
                        jobForm.reset();
                        statusMsg.style.display = "none";
                        formContent.style.display = "block";
                        submitBtn.innerText = "Submit Application";
                        submitBtn.disabled = false;
                    }, 5000);
                }
            });
        });
    </script>
</body>
</html>
