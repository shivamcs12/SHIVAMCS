<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rajasthan Patrika Login Panel</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      background:#0f172a;
      font-family:Arial, sans-serif;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-5">

  <!-- LOGIN PANEL -->
  <div id="loginBox" class="bg-slate-900 text-white p-8 rounded-2xl shadow-2xl w-full max-w-md">

    <!-- LOGO -->
    <div class="flex flex-col items-center mb-6">

      <img 
        src="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg"
        alt="Logo"
        class="w-24 h-24 mb-3"
      >

      <h2 class="text-2xl font-bold text-white">
        Rajasthan Patrika
      </h2>

    </div>

    <!-- TITLE -->
    <h1 class="text-3xl font-bold text-center mb-6">
      Login Panel
    </h1>

    <!-- USER ID -->
    <input 
      type="text"
      id="userid"
      placeholder="Enter User ID"
      class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 mb-4 outline-none focus:border-blue-500"
    >

    <!-- PASSWORD -->
    <input 
      type="password"
      id="password"
      placeholder="Enter Password"
      class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 mb-4 outline-none focus:border-blue-500"
    >

    <!-- LOGIN BUTTON -->
    <button 
      onclick="login()"
      class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg font-bold transition"
    >
      Login
    </button>

    <!-- ERROR MESSAGE -->
    <p id="msg" class="text-center mt-4 text-red-400"></p>

  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden w-full max-w-7xl">

    <!-- TOP BAR -->
    <div class="flex justify-between items-center mb-6">

      <h1 class="text-white text-3xl font-bold">
        Dashboard
      </h1>

      <button 
        onclick="logout()"
        class="bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-lg"
      >
        Logout
      </button>

    </div>

    <!-- 5 DIV -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-5">

      <!-- DIV 1 -->
      <a href="https://google.com" target="_blank">
        <div class="bg-slate-900 hover:bg-slate-800 transition text-white rounded-2xl p-10 text-center shadow-xl cursor-pointer">

          <h2 class="text-2xl font-bold mb-3">
            Coming Soon
          </h2>

          <p class="text-slate-400">
            Site Link 1
          </p>

        </div>
      </a>

      <!-- DIV 2 -->
      <a href="https://youtube.com" target="_blank">
        <div class="bg-slate-900 hover:bg-slate-800 transition text-white rounded-2xl p-10 text-center shadow-xl cursor-pointer">

          <h2 class="text-2xl font-bold mb-3">
            Coming Soon
          </h2>

          <p class="text-slate-400">
            Site Link 2
          </p>

        </div>
      </a>

      <!-- DIV 3 -->
      <a href="https://instagram.com" target="_blank">
        <div class="bg-slate-900 hover:bg-slate-800 transition text-white rounded-2xl p-10 text-center shadow-xl cursor-pointer">

          <h2 class="text-2xl font-bold mb-3">
            Coming Soon
          </h2>

          <p class="text-slate-400">
            Site Link 3
          </p>

        </div>
      </a>

      <!-- DIV 4 -->
      <a href="https://facebook.com" target="_blank">
        <div class="bg-slate-900 hover:bg-slate-800 transition text-white rounded-2xl p-10 text-center shadow-xl cursor-pointer">

          <h2 class="text-2xl font-bold mb-3">
            Coming Soon
          </h2>

          <p class="text-slate-400">
            Site Link 4
          </p>

        </div>
      </a>

      <!-- DIV 5 -->
      <a href="https://chatgpt.com" target="_blank">
        <div class="bg-slate-900 hover:bg-slate-800 transition text-white rounded-2xl p-10 text-center shadow-xl cursor-pointer">

          <h2 class="text-2xl font-bold mb-3">
            Coming Soon
          </h2>

          <p class="text-slate-400">
            Site Link 5
          </p>

        </div>
      </a>

    </div>

  </div>

  <script>

    // 5 USERS
    const users = [
      { id: "user1", pass: "1234" },
      { id: "user2", pass: "1234" },
      { id: "user3", pass: "1234" },
      { id: "user4", pass: "1234" },
      { id: "user5", pass: "1234" }
    ];

    // LOGIN FUNCTION
    function login(){

      const userid = document.getElementById("userid").value;
      const password = document.getElementById("password").value;

      const validUser = users.find(
        user => user.id === userid && user.pass === password
      );

      if(validUser){

        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");

      }else{

        document.getElementById("msg").innerText = "Invalid User ID or Password";

      }

    }

    // LOGOUT FUNCTION
    function logout(){

      document.getElementById("dashboard").classList.add("hidden");
      document.getElementById("loginBox").classList.remove("hidden");

      document.getElementById("userid").value = "";
      document.getElementById("password").value = "";
      document.getElementById("msg").innerText = "";

    }

  </script>

</body>
</html>
